services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      # Persist database and data directory on Hetzner volume
      - /mnt/HC_Volume_104464186/learn-language/data:/app/data
      # Persist media files
      - /mnt/HC_Volume_104464186/learn-language/data/audio:/app/public/audio
      - /mnt/HC_Volume_104464186/learn-language/data/homework:/app/public/homework
      - /mnt/HC_Volume_104464186/learn-language/data/images:/app/public/images
      # Persist env file
      - /mnt/HC_Volume_104464186/learn-language/.env.local:/app/.env.local:ro
      # Google TTS credentials
      - /mnt/HC_Volume_104464186/learn-language/tts:/app/tts:ro
    environment:
      - NODE_ENV=production
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - otel-collector
      - temporal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # ─── Temporal Infrastructure ─────────────────────────────────────────────

  temporal-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    volumes:
      - /mnt/HC_Volume_104464186/learn-language/data/temporal-db:/var/lib/postgresql/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  temporal:
    image: temporalio/auto-setup:latest
    depends_on:
      - temporal-db
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-db
    ports:
      - "7233:7233"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  temporal-ui:
    image: temporalio/ui:latest
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=https://learn.rocksbythesea.uk
    ports:
      - "8080:8080"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  temporal-worker:
    build:
      context: .
      dockerfile: Dockerfile.temporal-worker
    volumes:
      - /mnt/HC_Volume_104464186/learn-language/data:/app/data
      - /mnt/HC_Volume_104464186/learn-language/data/audio:/app/public/audio
      - /mnt/HC_Volume_104464186/learn-language/data/homework:/app/public/homework
      - /mnt/HC_Volume_104464186/learn-language/data/images:/app/public/images
      - /mnt/HC_Volume_104464186/learn-language/.env.local:/app/.env.local:ro
      - /mnt/HC_Volume_104464186/learn-language/tts:/app/tts:ro
    environment:
      - NODE_ENV=production
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # ─── Observability ───────────────────────────────────────────────────────

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    user: "0:0"
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /mnt/HC_Volume_104464186/learn-language/data/logs:/logs
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    restart: unless-stopped

volumes:
  temporal-db-data:
