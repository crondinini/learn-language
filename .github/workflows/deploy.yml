name: Deploy to Hetzner

on:
  push:
    branches:
      - main
    paths:
      - 'projects/learn-language-web-app/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e

            VOLUME_PATH="/mnt/HC_Volume_104464186/learn-language"
            APP_DIR=~/learn-language
            WEB_APP_DIR=$APP_DIR/projects/learn-language-web-app
            DEPLOY_DIR=/opt/learn-language

            # Clone or pull latest code
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone git@github.com:${{ github.repository }}.git $APP_DIR
            else
              cd $APP_DIR
              git fetch origin
              git reset --hard origin/main
            fi

            cd $WEB_APP_DIR

            # Create data directories if they don't exist
            mkdir -p $VOLUME_PATH/{data/backups,data/audio,data/images,data/homework,data/logs,tts}

            # Check .env.local exists
            if [ ! -f $VOLUME_PATH/.env.local ]; then
              echo "✗ Error: $VOLUME_PATH/.env.local not found. Create it manually first."
              exit 1
            fi

            # Backup database before deployment
            if [ -f $VOLUME_PATH/data/learn-language.db ]; then
              cp $VOLUME_PATH/data/learn-language.db $VOLUME_PATH/data/backups/learn-language-$(date +%Y%m%d-%H%M%S).db
              echo "✓ Database backed up"
            fi

            # Build the application
            npm ci
            NEXT_PHASE=phase-production-build npm run build
            npm run build:mcp-app

            # Deploy standalone output to /opt/learn-language
            rm -rf $DEPLOY_DIR
            cp -r .next/standalone $DEPLOY_DIR
            cp -r .next/static $DEPLOY_DIR/.next/static
            cp -r dist-mcp-app $DEPLOY_DIR/dist-mcp-app

            # Create symlinks for persistent data
            ln -sfn $VOLUME_PATH/data $DEPLOY_DIR/data
            ln -sfn $VOLUME_PATH/.env.local $DEPLOY_DIR/.env.local
            ln -sfn $VOLUME_PATH/tts $DEPLOY_DIR/tts
            # Homework files still live on filesystem — symlink to volume
            rm -rf $DEPLOY_DIR/public/homework
            ln -sfn $VOLUME_PATH/data/homework $DEPLOY_DIR/public/homework

            # Copy systemd service file if changed
            cp $WEB_APP_DIR/deploy/learn-language.service /etc/systemd/system/learn-language.service
            systemctl daemon-reload

            # Restart the service
            systemctl restart learn-language

            # Verify deployment
            sleep 5
            if curl -sf http://localhost:3000/login > /dev/null; then
              echo "✓ Deployment successful!"
            else
              echo "✗ Health check failed"
              journalctl -u learn-language --no-pager -n 20
              exit 1
            fi
